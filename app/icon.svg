<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow2" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="100" height="100" rx="18" fill="#0A0A0B"/>

  <g filter="url(#glow)" stroke="#38bdf8">
    <!-- Outer targeting ring (dashed) -->
    <circle cx="50" cy="50" r="42" stroke-width="2" stroke-opacity="0.2" stroke-dasharray="4 8"/>
    <!-- Outer arc highlight -->
    <circle cx="50" cy="50" r="42" stroke-width="1" stroke-opacity="0.5" stroke-dasharray="40 120"/>

    <!-- A / claw shape -->
    <path
      d="M 50 15 L 85 80 L 70 80 L 50 45 L 30 80 L 15 80 Z"
      fill="#38bdf8"
      fill-opacity="0.1"
      stroke-width="3"
      stroke-linejoin="miter"
    />

    <!-- Crosshair accent -->
    <path
      d="M 50 25 L 50 35 M 40 55 L 60 55 M 50 65 L 50 85"
      stroke-width="3"
      stroke-linecap="square"
    />

    <!-- Center scope dot -->
    <circle cx="50" cy="55" r="3" fill="#38bdf8" stroke="none"/>
  </g>
</svg>
