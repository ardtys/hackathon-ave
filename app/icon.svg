<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Solid background for favicons -->
  <rect width="100" height="100" rx="20" fill="#0A0A0B" />
  
  <g stroke="#39ff14">
    <!-- Outer targeting ring -->
    <circle cx="50" cy="50" r="38" stroke-width="4" stroke-opacity="0.3" stroke-dasharray="4 8" />
    
    <!-- Sharp geometric A / Claw shape -->
    <path 
      d="M 50 20 L 80 75 L 65 75 L 50 45 L 35 75 L 20 75 Z" 
      fill="#39ff14" 
      fill-opacity="0.1"
      stroke-width="4" 
      stroke-linejoin="miter"
    />
    
    <!-- Inner crosshair accent -->
    <path 
      d="M 50 30 L 50 40 M 40 55 L 60 55 M 50 65 L 50 85" 
      stroke-width="4" 
      stroke-linecap="square"
    />
    
    <!-- Center scope dot -->
    <circle cx="50" cy="55" r="4" fill="#39ff14" stroke="none" />
  </g>
</svg>
